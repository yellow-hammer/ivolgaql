name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "например v0.2.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-workflow
  cancel-in-progress: false

jobs:
  bump:
    name: Версия, коммит и тег
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Разбор и проверка версии
        id: meta
        run: |
          set -euo pipefail
          TAG="${{ inputs.version }}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Нужен тег вида vM.m.p, например v0.2.0 (обязателен префикс v, без суффиксов)"
            exit 1
          fi
          VER="${TAG#v}"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Синхронизация с origin/main
        run: git pull --rebase origin main

      - uses: dtolnay/rust-toolchain@stable

      - name: Обновить version в Cargo.toml
        env:
          VERSION: ${{ steps.meta.outputs.ver }}
        run: sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Обновить Cargo.lock
        run: cargo build

      - name: cargo test
        run: cargo test

      - name: Коммит, аннотированный тег и push
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.ver }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          if git diff --staged --quiet; then
            echo "::error::Нет изменений: версия в репозитории уже $VERSION?"
            exit 1
          fi
          git commit -m "chore: release $TAG"
          git tag -a "$TAG" -m "$TAG"
          git push origin HEAD:main
          git push origin "$TAG"

  build:
    name: ${{ matrix.target }}
    needs: bump
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p staging
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/ivolgaql.exe" \
              "staging/ivolgaql-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/ivolgaql" \
              "staging/ivolgaql-${{ matrix.target }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: staging/*

  publish:
    name: GitHub Release
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          pattern: binary-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          generate_release_notes: true
          files: assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
